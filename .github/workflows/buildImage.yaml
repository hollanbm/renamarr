#
name: Build and publish Docker images

on:
  release:
    types:
      - published
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  DHI_REGISTRY: dhi.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    name: Docker image (${{ matrix.variant.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: runtime
            runtime_image: dhi.io/debian-base:trixie
            tag_suffix: ''
          - name: runtime-dev
            runtime_image: dhi.io/debian-base:trixie-dev
            tag_suffix: -dev
    permissions:
      contents: read
      packages: write
    steps:
      - name: Verify Docker Hardened Images token
        env:
          DHI_PAT: ${{ secrets.DHI_PAT }}
        run: |
          if [ -z "$DHI_PAT" ]; then
            echo "::error title=Missing secret::DHI_PAT must be configured as an Actions secret and a Dependabot secret."
            exit 1
          fi
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Log in to the Container registry
        if: ${{ github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]' }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hardened Images registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c  # v4
        with:
          registry: ${{ env.DHI_REGISTRY }}
          username: ${{ vars.DHI_USERNAME }}
          password: ${{ secrets.DHI_PAT }}

      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant.tag_suffix }},onlatest=true
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=pr-${{ github.event.pull_request.number }}-{{sha}},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value={{branch}},enable=${{ github.event_name == 'push' }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.revision={{sha}}
            org.opencontainers.image.version={{version}}
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss[Z]'}}
          annotations: |
            org.opencontainers.image.description=${{ github.event.repository.description }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]' }}
          build-args: |
            RUNTIME_IMAGE=${{ matrix.variant.runtime_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
